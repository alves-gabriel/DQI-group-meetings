<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="icon" href="{{ '/assets/img/site-thumbnail.svg' | relative_url }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  <script defer src="{{ '/assets/js/obsidian-callouts.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
<body>
  <header class="site-header">
    <nav class="site-nav" aria-label="Main navigation">
      <img class="site-logo" src="{{ '/assets/img/trinity-college-dublin-logo.svg' | relative_url }}" alt="Trinity College Dublin">
      <a class="site-title" href="{{ '/' | relative_url }}">Dynamics of Quantum Information - Backlog</a>
      <div class="nav-links">
        <a href="{{ '/archive/' | relative_url }}">Search</a>
      </div>
    </nav>
  </header>

  <main class="page">
    {{ content }}
  </main>
</body>
</html>
